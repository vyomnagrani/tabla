name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: online-tabla

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          IMAGE_URI=${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${IMAGE_TAG}
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy to ACA
        run: |
          az containerapp update \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --image $IMAGE_URI

      - name: Validate health endpoint
        run: |
          FQDN=$(az containerapp show \
            --name ${{ secrets.ACA_APP_NAME }} \
            --resource-group ${{ secrets.ACA_RESOURCE_GROUP }} \
            --query properties.latestRevisionFqdn -o tsv)
          curl -f https://$FQDN/health
